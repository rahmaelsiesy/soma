name: Weekly Sprint Planning Issue
on:
  schedule:
    - cron: '0 16 * * 1'  # 9am PDT Monday (UTC-8)
  workflow_dispatch:

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create weekly review issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const weekNum = Math.ceil((new Date() - new Date(new Date().getFullYear(), 0, 1)) / (7 * 24 * 3600 * 1000));
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Review — Week ${weekNum} (${date})`,
              body: `## Reflection — Past Week\n\n<!-- What did I complete? What stalled? What surprised me? What did I learn? -->\n\n**Deep work blocks completed this week:** ___ / 14 target\n\n**Highlights:**\n- \n\n**What blocked me:**\n- \n\n---\n\n## Plan — Next Week\n\n**Top 3 PhD-critical tasks (deep work):**\n1. \n2. \n3. \n\n**Lab days this week:** (mark which days)\n- [ ] Mon  [ ] Tue  [ ] Wed  [ ] Thu  [ ] Fri\n\n**Samples in pipeline:**\n- \n\n**Any instrument bookings needed:**\n- [ ] SG Booster\n- [ ] Photobleacher  \n- [ ] GenePS scope\n\n---\n\n## Reprioritization\n\n<!-- Any changes to milestone order? New urgency? Anything to drop? -->\n\n## XP Earned This Week\n\n<!-- Open Quest Board → Export JSON → paste total XP here -->\n**XP this week:** ___  **Total XP:** ___ / 1400  **Level:** ___\n\n---\n*Auto-generated by neuro-atlas weekly review action · ${date}*`,
              labels: ['weekly-review']
            });
