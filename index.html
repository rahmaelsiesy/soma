<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#141418">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Soma">
  <link rel="apple-touch-icon" href="icon-192.png">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-shell">

    <!-- ===== SIDEBAR (desktop) — 5 primary tabs + More ===== -->
    <nav class="sidebar" id="sidebar">
      <div class="nav-item" data-nav="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        <span class="tooltip">Home</span>
      </div>
      <div class="nav-item" data-nav="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span class="tooltip">Projects</span>
      </div>
      <div class="nav-item" data-nav="focus">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span class="tooltip">Focus</span>
      </div>
      <div class="nav-item" data-nav="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span class="tooltip">Progress</span>
      </div>
      <div class="nav-spacer"></div>
      <div class="nav-item" data-nav="more">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
        <span class="tooltip">More</span>
      </div>
    </nav>

    <!-- ===== BOTTOM BAR (mobile) — 5 primary tabs + More ===== -->
    <nav class="bottom-bar" id="bottomBar">
      <div class="nav-item" data-nav="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        <span>Home</span>
      </div>
      <div class="nav-item" data-nav="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span>Projects</span>
      </div>
      <div class="nav-item" data-nav="focus">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span>Focus</span>
      </div>
      <div class="nav-item" data-nav="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Progress</span>
      </div>
      <div class="nav-item" data-nav="more">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
        <span>More</span>
      </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" id="mainContent">

      <!-- HOME -->
      <section class="view home-view" id="view-home"></section>

      <!-- PROJECTS -->
      <section class="view" id="view-projects"></section>

      <!-- TRACK (milestones for a project) -->
      <section class="view" id="view-track"></section>

      <!-- PATH (board-game step path) -->
      <section class="view" id="view-path"></section>

      <!-- FOCUS -->
      <section class="view" id="view-focus"></section>

      <!-- SCHEDULE -->
      <section class="view" id="view-schedule"></section>

      <!-- IDEAS -->
      <section class="view" id="view-ideas"></section>

      <!-- ADMIN (Feature 5) -->
      <section class="view" id="view-admin"></section>

      <!-- PREP (Feature 6) -->
      <section class="view" id="view-prep"></section>

      <!-- REWARDS (Feature 9) -->
      <section class="view" id="view-rewards"></section>

      <!-- PROGRESS (Feature 10) -->
      <section class="view" id="view-progress"></section>

      <!-- DOCS -->
      <section class="view" id="view-docs"></section>

      <!-- SETTINGS -->
      <section class="view" id="view-settings"></section>
    </main>
  </div>

  <!-- Drawer overlay -->
  <div class="drawer-overlay" id="drawerOverlay">
    <div class="drawer" id="drawer"></div>
  </div>

  <!-- Timer pill (persistent across routes while timer is running) -->
  <a class="timer-pill" id="timerPill" href="#focus" aria-label="Active focus timer" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
    <span class="timer-pill-text"><span class="timer-pill-time" id="timerPillTime">00:00</span><span class="timer-pill-label" id="timerPillLabel"></span></span>
  </a>

  <!-- Anti-switch modal (hidden — timer now persists across routes) -->
  <div class="modal-overlay" id="antiSwitchModal" hidden>
    <div class="modal-box">
      <p id="antiSwitchMsg"></p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="modalStay">Stay</button>
        <button class="btn btn-outline" id="modalLeave">Leave</button>
      </div>
    </div>
  </div>

  <!-- Weekly Review modal (Feature 11) -->
  <div class="modal-overlay" id="weeklyReviewModal">
    <div class="modal-box review-modal-box" id="weeklyReviewBox"></div>
  </div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confettiContainer"></div>

  <script src="data.js"></script>
  <script src="protocol_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
