<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#141418">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Soma">
  <link rel="apple-touch-icon" href="icon-192.png">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-shell">

    <!-- ===== SIDEBAR (desktop) ===== -->
    <nav class="sidebar" id="sidebar">
      <div class="nav-item" data-nav="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        <span class="tooltip">Home</span>
      </div>
      <div class="nav-item" data-nav="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span class="tooltip">Projects</span>
      </div>
      <!-- Feature 6: Prep nav item (between Projects and Schedule) -->
      <div class="nav-item" data-nav="prep">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
        <span class="tooltip">Prep</span>
      </div>
      <div class="nav-item" data-nav="schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span class="tooltip">Schedule</span>
      </div>
      <!-- Feature 10: Progress nav item (between Schedule and Ideas) -->
      <div class="nav-item" data-nav="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span class="tooltip">Progress</span>
      </div>
      <div class="nav-item" data-nav="ideas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0018 8 6 6 0 006 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 018.91 14"/></svg>
        <span class="tooltip">Ideas</span>
      </div>
      <!-- Feature 5: Admin nav item -->
      <div class="nav-item" data-nav="admin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
        <span class="tooltip">Admin</span>
      </div>
      <!-- Feature 9: Rewards nav item (between Admin and spacer) -->
      <div class="nav-item" data-nav="rewards">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
        <span class="tooltip">Rewards</span>
      </div>
      <div class="nav-spacer"></div>
      <div class="nav-item" data-nav="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span class="tooltip">Settings</span>
      </div>
    </nav>

    <!-- ===== BOTTOM BAR (mobile) ===== -->
    <nav class="bottom-bar" id="bottomBar">
      <div class="nav-item" data-nav="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        <span>Home</span>
      </div>
      <div class="nav-item" data-nav="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span>Projects</span>
      </div>
      <div class="nav-item" data-nav="schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span>Schedule</span>
      </div>
      <!-- Feature 10: Progress (mobile) -->
      <div class="nav-item" data-nav="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Progress</span>
      </div>
      <!-- Feature 9: Rewards (mobile) -->
      <div class="nav-item" data-nav="rewards">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
        <span>Rewards</span>
      </div>
      <div class="nav-item" data-nav="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Settings</span>
      </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" id="mainContent">

      <!-- HOME -->
      <section class="view home-view" id="view-home"></section>

      <!-- PROJECTS -->
      <section class="view" id="view-projects"></section>

      <!-- TRACK (milestones for a project) -->
      <section class="view" id="view-track"></section>

      <!-- PATH (board-game step path) -->
      <section class="view" id="view-path"></section>

      <!-- FOCUS -->
      <section class="view" id="view-focus"></section>

      <!-- SCHEDULE -->
      <section class="view" id="view-schedule"></section>

      <!-- IDEAS -->
      <section class="view" id="view-ideas"></section>

      <!-- ADMIN (Feature 5) -->
      <section class="view" id="view-admin"></section>

      <!-- PREP (Feature 6) -->
      <section class="view" id="view-prep"></section>

      <!-- REWARDS (Feature 9) -->
      <section class="view" id="view-rewards"></section>

      <!-- PROGRESS (Feature 10) -->
      <section class="view" id="view-progress"></section>

      <!-- SETTINGS -->
      <section class="view" id="view-settings"></section>
    </main>
  </div>

  <!-- Drawer overlay -->
  <div class="drawer-overlay" id="drawerOverlay">
    <div class="drawer" id="drawer"></div>
  </div>

  <!-- Anti-switch modal -->
  <div class="modal-overlay" id="antiSwitchModal">
    <div class="modal-box">
      <p id="antiSwitchMsg"></p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="modalStay">Stay</button>
        <button class="btn btn-outline" id="modalLeave">Leave</button>
      </div>
    </div>
  </div>

  <!-- Weekly Review modal (Feature 11) -->
  <div class="modal-overlay" id="weeklyReviewModal">
    <div class="modal-box review-modal-box" id="weeklyReviewBox"></div>
  </div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confettiContainer"></div>

  <script src="data.js"></script>
  <script src="protocol_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
