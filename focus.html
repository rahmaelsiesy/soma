<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Mode — Rahma's Quest Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="focus-page">

<!-- LEAD TIME WARNING BANNER -->
<div id="focusLeadWarn" class="lead-time-banner" style="display:none"></div>

<!-- HEADER -->
<header class="focus-header">
  <a href="javascript:history.back()" class="back-btn" style="flex-shrink:0">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back
  </a>
  <span style="font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--text);flex:1;text-align:center">Focus Mode</span>
  <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme" style="flex-shrink:0">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<!-- MAIN FOCUS AREA -->
<main class="focus-main">

  <!-- Breadcrumb -->
  <div class="focus-breadcrumb" id="focusBreadcrumb">Quest Board</div>

  <!-- Step title — ALWAYS VISIBLE -->
  <h1 class="focus-step-title" id="focusStepTitle">What am I doing right now?</h1>

  <!-- Quadrant badge -->
  <div id="focusQuadrantBadge" style="margin-bottom:24px;display:none"></div>

  <!-- TIMER -->
  <div class="timer-container">
    <div class="timer-ring-wrap" id="timerRingWrap">
      <svg class="timer-ring-svg" width="220" height="220" viewBox="0 0 220 220">
        <defs>
          <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f97316"/>
            <stop offset="100%" stop-color="#ef4444"/>
          </linearGradient>
        </defs>
        <circle class="timer-ring-bg" cx="110" cy="110" r="98"/>
        <circle class="timer-ring-fill" id="timerRingFill" cx="110" cy="110" r="98"
          stroke-dasharray="615.75"
          stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display">
        <span id="timerText">90:00</span>
        <span class="timer-label-small" id="timerStatusLabel">READY</span>
      </div>
    </div>

    <div class="timer-controls">
      <button class="timer-start-btn" id="timerStartBtn">▶ Start</button>
      <button class="timer-reset-btn" id="timerResetBtn">↺ Reset</button>
    </div>
  </div>

  <!-- SESSION DOTS -->
  <div class="session-dots-area">
    <div class="session-dots-label">Completed sessions this step</div>
    <div class="session-dots" id="sessionDots"></div>
  </div>

  <!-- CHECKLIST MINI-VIEW -->
  <div class="focus-checklist-area" id="focusChecklistArea" style="display:none">
    <div class="focus-checklist-title" id="focusChecklistTitle">Step checklist</div>
    <div class="focus-progress-bar-wrap">
      <div class="focus-progress-bar-fill" id="focusProgressBar" style="width:0%"></div>
    </div>
    <div id="focusChecklist"></div>
  </div>

  <!-- MARK COMPLETE -->
  <button class="focus-mark-done-btn" id="focusMarkDone" disabled>
    ✓ Mark Step Complete
  </button>
  <div id="focusMarkDoneHint" style="font-size:0.78rem;color:var(--text-faint);text-align:center;margin-top:-8px;margin-bottom:16px">
    Complete all checklist items to unlock
  </div>

  <!-- NEXT SUGGESTION -->
  <div id="focusNextSuggestion" class="focus-next-suggestion" style="display:none"></div>

</main>

<!-- SESSION COMPLETE BANNER -->
<div class="session-complete-banner" id="sessionCompleteBanner">
  <div class="session-complete-emoji">🎉</div>
  <h3 class="session-complete-title">Session Complete!</h3>
  <p class="session-complete-sub" id="sessionCompleteSubtext">90 minutes of deep work. Session logged.</p>
  <button class="session-continue-btn" id="sessionContinueBtn">Keep going ▶</button>
</div>

<!-- FOOTER NAV -->
<footer class="focus-footer">
  <a href="javascript:history.back()" class="focus-footer-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Milestone path
  </a>
  <a href="index.html" class="focus-footer-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Quest Board
  </a>
  <a href="misc.html" class="focus-footer-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 11l3 3L22 4"/></svg>
    Triage
  </a>
</footer>

<!-- CONFETTI -->
<canvas id="confettiCanvas" aria-hidden="true"></canvas>

<script src="data.js"></script>
<script src="app.js"></script>
<script src="triage.js"></script>
<script>
// ============================================================
// FOCUS PAGE — 90-min Pomodoro + ADHD optimizations
// ============================================================

const TOTAL_SECONDS = 90 * 60; // 90 minutes
const CIRCUMFERENCE = 2 * Math.PI * 98; // 615.75

let timerInterval = null;
let secondsLeft = TOTAL_SECONDS;
let timerRunning = false;
let currentStepData = null;
let currentMilestoneId = null;
let currentStepId = null;

// ---- PARSE URL PARAMS ----
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { stepId: p.get('stepId'), milestoneId: p.get('milestoneId') };
}

// ---- FIND STEP ----
function findStep(stepId, milestoneId) {
  for (const trackId of TRACK_ORDER) {
    for (const m of (QUEST_DATA[trackId] || [])) {
      if (milestoneId && m.id !== milestoneId) continue;
      for (const step of (m.steps || [])) {
        if (step.id === stepId) return { step, milestone: m };
      }
    }
  }
  return null;
}

// ---- FIND BEST STEP (Q1 first, then Q3) ----
function findBestStep() {
  // Look for Q1 step first
  for (const trackId of TRACK_ORDER) {
    for (const m of (QUEST_DATA[trackId] || [])) {
      for (const step of (m.steps || [])) {
        const ss = getStepState(m.id, step.id);
        if (ss.status === 'done') continue;
        const q = getStepQuadrant(m.id, step.id, step);
        if (q === 'Q1') return { step, milestone: m };
      }
    }
  }
  // Then Q3
  for (const trackId of TRACK_ORDER) {
    for (const m of (QUEST_DATA[trackId] || [])) {
      for (const step of (m.steps || [])) {
        const ss = getStepState(m.id, step.id);
        if (ss.status === 'done') continue;
        const q = getStepQuadrant(m.id, step.id, step);
        if (q === 'Q3') return { step, milestone: m };
      }
    }
  }
  // Any active step
  for (const trackId of TRACK_ORDER) {
    for (const m of (QUEST_DATA[trackId] || [])) {
      for (const step of (m.steps || [])) {
        const ss = getStepState(m.id, step.id);
        if (ss.status !== 'done') return { step, milestone: m };
      }
    }
  }
  return null;
}

// ---- TIMER RENDERING ----
function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function updateTimerDisplay() {
  document.getElementById('timerText').textContent = formatTime(secondsLeft);
  // Ring
  const fill = document.getElementById('timerRingFill');
  const progress = (TOTAL_SECONDS - secondsLeft) / TOTAL_SECONDS;
  fill.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
  // Browser tab title
  if (timerRunning && currentStepData) {
    const name = currentStepData.step.title.substring(0, 30);
    document.title = `⏱ ${formatTime(secondsLeft)} — ${name}`;
  }
}

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  document.getElementById('timerStartBtn').textContent = '⏸ Pause';
  document.getElementById('timerStartBtn').classList.add('paused');
  document.getElementById('timerStatusLabel').textContent = 'RUNNING';

  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      onSessionComplete();
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('timerStartBtn').textContent = '▶ Resume';
  document.getElementById('timerStartBtn').classList.remove('paused');
  document.getElementById('timerStatusLabel').textContent = 'PAUSED';
  document.title = 'Focus Mode — Quest Board';
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  secondsLeft = TOTAL_SECONDS;
  updateTimerDisplay();
  document.getElementById('timerStartBtn').textContent = '▶ Start';
  document.getElementById('timerStartBtn').classList.remove('paused');
  document.getElementById('timerStatusLabel').textContent = 'READY';
  document.title = 'Focus Mode — Quest Board';
}

function onSessionComplete() {
  document.getElementById('timerStatusLabel').textContent = 'DONE!';
  document.title = '🎉 Session Complete! — Quest Board';

  // Save session count
  if (currentStepId && currentMilestoneId) {
    const ss = getStepState(currentMilestoneId, currentStepId);
    setStepState(currentMilestoneId, currentStepId, { sessions: (ss.sessions || 0) + 1 });
    renderSessionDots();
  }

  // Browser notification
  if (Notification.permission === 'granted') {
    new Notification('Session Complete! 🎉', {
      body: `90 minutes on "${currentStepData?.step?.title}" — take a 10 min break!`,
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="28" font-size="28">🔬</text></svg>'
    });
  }

  // Show banner
  const banner = document.getElementById('sessionCompleteBanner');
  const ss = getStepState(currentMilestoneId, currentStepId);
  document.getElementById('sessionCompleteSubtext').textContent =
    `90 min of deep work complete. Session #${ss.sessions || 1} logged.`;
  banner.classList.add('show');

  triggerConfetti();
}

function renderSessionDots() {
  const dotsContainer = document.getElementById('sessionDots');
  if (!currentStepId || !currentMilestoneId) return;
  const ss = getStepState(currentMilestoneId, currentStepId);
  const n = ss.sessions || 0;
  dotsContainer.innerHTML = '';
  const maxDots = Math.max(n + 3, 5);
  for (let i = 0; i < maxDots; i++) {
    const dot = document.createElement('div');
    dot.className = 'session-dot' + (i < n ? ' filled' : '');
    dotsContainer.appendChild(dot);
  }
}

// ---- CHECKLIST ----
function renderChecklist(step, milestoneId) {
  const area = document.getElementById('focusChecklistArea');
  const checkDiv = document.getElementById('focusChecklist');
  const progressBar = document.getElementById('focusProgressBar');

  if (!step.checklist || !step.checklist.length) {
    area.style.display = 'none';
    document.getElementById('focusMarkDone').disabled = false;
    document.getElementById('focusMarkDoneHint').style.display = 'none';
    return;
  }

  area.style.display = '';
  document.getElementById('focusChecklistTitle').textContent = `Checklist (${step.title})`;

  function refresh() {
    const ss = getStepState(milestoneId, step.id);
    const checked = ss.checklist || {};
    const total = step.checklist.length;
    const doneCount = step.checklist.filter((_, ci) => !!checked['item' + ci]).length;

    progressBar.style.width = Math.round((doneCount / total) * 100) + '%';

    checkDiv.innerHTML = '';
    step.checklist.forEach((item, ci) => {
      const isChecked = !!checked['item' + ci];
      const row = document.createElement('div');
      row.className = 'checklist-item';
      row.innerHTML = `
        <div class="checklist-checkbox ${isChecked ? 'checked' : ''}"></div>
        <span class="checklist-label ${isChecked ? 'checked' : ''}">${item}</span>
      `;
      row.addEventListener('click', () => {
        const s = getStepState(milestoneId, step.id);
        const c = { ...(s.checklist || {}) };
        c['item' + ci] = !c['item' + ci];
        setStepState(milestoneId, step.id, { checklist: c });
        refresh();
      });
      checkDiv.appendChild(row);
    });

    const allDone = doneCount === total;
    document.getElementById('focusMarkDone').disabled = !allDone;
    document.getElementById('focusMarkDoneHint').style.display = allDone ? 'none' : '';
  }
  refresh();
}

// ---- INIT ----
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  const theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);

  // Theme toggle
  const toggle = document.querySelector('[data-theme-toggle]');
  toggle?.addEventListener('click', () => {
    const curr = document.documentElement.getAttribute('data-theme');
    const next = curr === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  // Request notification permission
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // Determine step to focus on
  const { stepId, milestoneId } = getParams();
  let stepResult = null;

  if (stepId && milestoneId) {
    stepResult = findStep(stepId, milestoneId);
  }
  if (!stepResult) {
    stepResult = findBestStep();
  }

  if (stepResult) {
    currentStepData = stepResult;
    currentStepId = stepResult.step.id;
    currentMilestoneId = stepResult.milestone.id;

    // Set title
    document.getElementById('focusStepTitle').textContent = stepResult.step.title;
    document.title = `Focus: ${stepResult.step.title}`;

    // Breadcrumb
    document.getElementById('focusBreadcrumb').textContent =
      `${stepResult.milestone.emoji || ''} ${stepResult.milestone.title}`;

    // Quadrant badge
    const q = getStepQuadrant(stepResult.milestone.id, stepResult.step.id, stepResult.step);
    const qBadge = document.getElementById('focusQuadrantBadge');
    if (q === 'Q1' || q === 'Q3') {
      qBadge.style.display = '';
      qBadge.innerHTML = `<span class="quadrant-pill ${q === 'Q1' ? 'q1-pill' : 'q3-pill'}">${q} — ${q === 'Q1' ? 'Do Now' : 'Scheduled'}</span>`;
    }

    // Lead time warning
    const triageData = getStepTriageData(currentMilestoneId, currentStepId);
    const leadHrs = triageData.compute_lead_hrs || stepResult.step.compute_lead_hrs;
    const dueDate = triageData.due_date;
    if (leadHrs && dueDate) {
      const warn = getLeadTimeWarning({ compute_lead_hrs: leadHrs, due_date: dueDate });
      if (warn) {
        const warnDiv = document.getElementById('focusLeadWarn');
        warnDiv.style.display = '';
        warnDiv.className = 'lead-time-banner ' + (warn.level === 'red' ? 'banner-red' : 'banner-yellow');
        warnDiv.innerHTML = `${warn.level === 'red' ? '🚨' : '⚠️'} <strong>${stepResult.step.title}</strong> — ${warn.message}`;
      }
    }

    // Session dots
    renderSessionDots();

    // Checklist
    renderChecklist(stepResult.step, stepResult.milestone.id);
  } else {
    document.getElementById('focusStepTitle').textContent = 'No active step found — visit the Quest Board to start a milestone.';
  }

  // Timer controls
  document.getElementById('timerStartBtn').addEventListener('click', () => {
    if (timerRunning) pauseTimer();
    else startTimer();
  });
  document.getElementById('timerResetBtn').addEventListener('click', resetTimer);

  // Session complete banner
  document.getElementById('sessionContinueBtn').addEventListener('click', () => {
    document.getElementById('sessionCompleteBanner').classList.remove('show');
    resetTimer();
  });

  // Mark done
  document.getElementById('focusMarkDone').addEventListener('click', () => {
    if (!currentStepId || !currentMilestoneId) return;
    setStepState(currentMilestoneId, currentStepId, { status: 'done' });
    // Update milestone status
    const milestone = currentStepData?.milestone;
    if (milestone) {
      const allDone = (milestone.steps || []).every(s => getStepState(milestone.id, s.id).status === 'done');
      if (allDone) setMilestoneState(milestone.id, { status: 'done' });
    }
    triggerConfetti();
    document.getElementById('focusMarkDone').textContent = '✓ Completed!';
    document.getElementById('focusMarkDone').disabled = true;
    document.getElementById('focusMarkDoneHint').style.display = 'none';
    // Show next step suggestion
    showNextSuggestion();
  });

  updateTimerDisplay();
});

function showNextSuggestion() {
  const next = findBestStep();
  if (!next || next.step.id === currentStepId) return;
  const sug = document.getElementById('focusNextSuggestion');
  sug.style.display = '';
  sug.innerHTML = `
    <div class="focus-next-label">Next up:</div>
    <a href="focus.html?stepId=${encodeURIComponent(next.step.id)}&milestoneId=${encodeURIComponent(next.milestone.id)}" class="focus-next-link">
      ${next.milestone.emoji || ''} ${next.step.title} →
    </a>
  `;
}
</script>
</body>
</html>
